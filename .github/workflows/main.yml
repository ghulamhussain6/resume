name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      # This step checks if your GitHub Secrets are actually being found
      - name: Debug Secrets
        run: |
          echo "Checking if secrets are available..."
          if [ -z "${{ secrets.DOCKERHUB_USERNAME }}" ]; then echo "❌ USERNAME IS MISSING"; else echo "✅ USERNAME IS LOADED"; fi
          if [ -z "${{ secrets.DOCKERHUB_TOKEN }}" ]; then echo "❌ TOKEN IS MISSING"; else echo "✅ TOKEN IS LOADED"; fi

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: hussainghulam/resume-app-cloud:latest
