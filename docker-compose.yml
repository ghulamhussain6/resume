version: '3.8'

services:
  # 1. Nginx Proxy (The Front Door)
  proxy:
    image: nginx:alpine
    container_name: ${PROXY_CONTAINER}
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - resume-app-professional
    networks:
      - resume-network

  # 2. Node.js App (Self-Healing & Optimized)
  resume-app-professional:
    image: ${IMAGE_NAME}:${IMAGE_TAG}
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ${APP_CONTAINER}
    restart: always
    environment:
      - PORT=${APP_PORT}
      - MONGO_URI=${MONGO_URI}
    # --- HEALTHCHECK: Pings the app every 30s to ensure it's alive ---
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${APP_PORT}/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    depends_on:
      - mongodb-service
    networks:
      - resume-network

  # 3. MongoDB (The Persistent Memory)
  mongodb-service:
    image: mongo:4.4
    container_name: ${DB_CONTAINER}
    restart: always
    volumes:
      - ./data/mongodb:/data/db
    networks:
      - resume-network

# --- DEDICATED NETWORK: Isolates your app from other Docker projects ---
networks:
  resume-network:
    driver: bridge
