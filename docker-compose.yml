services:
  mongodb-service:
    image: mongo:4.4
    restart: always
    volumes:
      - mongo-data:/data/db

  resume-app:
    image: hussainghulam/resume-app-cloud:latest
    restart: always
    depends_on:
      - mongodb-service
    expose:
      - "3001"
    environment:
      - MONGODB_URI=mongodb://mongodb-service:27017/resume_db

  nginx:
    image: nginx:latest
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro

volumes:
  mongo-data:
